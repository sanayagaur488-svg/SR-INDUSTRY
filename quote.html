<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Quote | SR Industry</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="quote-page">

<h5>REQUEST A QUOTE</h5>

<h1>Get Your Free Quote</h1>

<p>
Tell us your requirements and our team will contact you shortly.
</p>

<form id="quoteForm" class="quote-form">

<input type="text" placeholder="Your Name" required>

<input type="tel" placeholder="Phone Number" required>

<input type="email" placeholder="Email Address" required>

<input type="text" placeholder="Company Name">

<select>
<option>Select Product</option>
<option>Catering Counter</option>
<option>Mocktail Counter</option>
<option>Coffee Hut</option>
<option>Banquet Interior</option>
<option>Salad Counter</option>
<option>Customized Product</option>
</select>

<textarea placeholder="Describe Your Requirement"></textarea>

<button type="submit">Request Quote</button>

</form>

</section>
<script src="script.js"></script>

</body>
</html>
